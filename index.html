<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <h1 class="store-title">ZENIT TECH STORE</h1>
        <button class="cart-toggle-btn" onclick="toggleCart()">
            <span class="cart-icon">🛒</span>
            <span class="cart-badge" id="cart-count">0</span>
        </button>
    </header>

    <main class="store-content">
        <section class="products-container">
            <div id="product-list" class="product-grid"></div>
        </section>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <aside class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2 class="cart-title">Shopping Cart</h2>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        
        <div class="cart-body">
            <div id="empty-message" class="empty-state">
                Your cart is empty.
            </div>
            <div id="cart-items" class="cart-items-list"></div>
        </div>
        
        <div class="cart-footer" id="cart-footer">
            <div class="summary-row">
                <span class="summary-label">Total Price:</span>
                <span class="summary-value">P <span id="cart-total">0</span></span>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="checkout()">Checkout</button>
                <button class="btn-secondary" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
